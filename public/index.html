<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Idea Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>🚀 AI Idea Generator</h1>

    <!-- INPUT -->
    <input id="prompt" placeholder="Ne yapmak istiyorsun?" />

    <!-- BUTTON -->
    <button onclick="generate()">Oluştur</button>

    <!-- LOADING -->
    <div id="loading" class="hidden">Thinking...</div>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- HISTORY -->
    <h3>📌 History</h3>
    <div id="history"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
