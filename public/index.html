<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaForge - Fikir Geliştirici</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAV -->
  <header class="nav">
    <div class="logo">IdeaForge</div>
    <button class="btn-small">Get Started</button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Fikrini al, <span>gerçek ürüne dönüştür</span></h1>
    <p>Basit fikirleri güçlü startup konseptlerine çevir.</p>

    <div class="card">
      <input id="ideaInput" placeholder="Örn: mobil uygulama fikrim var..." />
      <button onclick="generateIdeas()">Fikri Geliştir</button>

      <div id="output"></div>
    </div>
  </section>

  <!-- FEATURES -->
  <section class="features">
    <div class="feature">
      ⚡ Hızlı analiz
    </div>
    <div class="feature">
      💡 Startup önerileri
    </div>
    <div class="feature">
      🎯 MVP fikirleri
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
<button onclick="generateIdeas()"></button>
<input id="ideaInput" placeholder="Fikrini yaz..." />

<button onclick="generateIdea()">Generate</button>

<div id="improvement"></div>
<div id="risks"></div>
<div id="monetization"></div>
<div id="mvp"></div>
